---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cc
spec:
  chartRef:
    kind: OCIRepository
    name: claude-code
  interval: 1h
  values:
    controllers:
      cc:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/ferry133/claude-code
              tag: latest
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: claude-code-secret
                    key: DATABASE_URL
              CLAUDE_USER_ID: "cc"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7681
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7681
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
          oauth2-proxy:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.7.1
            args:
              - --provider=oidc
              - --oidc-issuer-url=https://dev-s6klrnbd0umevgxf.us.auth0.com/
              - --upstream=http://localhost:7681
              - --http-address=0.0.0.0:4180
              - --redirect-url=https://cc.${SECRET_DOMAIN}/oauth2/callback
              - --email-domain=*
              - --cookie-secure=true
              - --set-xauthrequest=true
              - --pass-access-token=false
              - --skip-provider-button=false
            env:
              OAUTH2_PROXY_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: claude-code-secret
                    key: OAUTH2_PROXY_CLIENT_ID
              OAUTH2_PROXY_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: claude-code-secret
                    key: OAUTH2_PROXY_CLIENT_SECRET
              OAUTH2_PROXY_COOKIE_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: claude-code-secret
                    key: OAUTH2_PROXY_COOKIE_SECRET
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              runAsUser: 65532
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    persistence:
      claude-config:
        type: persistentVolumeClaim
        storageClass: sc-nas
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          cc:
            app:
              - path: /home/claude/.claude
      claude-workspace:
        type: persistentVolumeClaim
        storageClass: sc-nas
        accessMode: ReadWriteOnce
        size: 20Gi
        advancedMounts:
          cc:
            app:
              - path: /home/claude/workspace
      coding:
        type: nfs
        server: "${NAS_SERVER}"
        path: "${NAS_CODING_PATH}"
        advancedMounts:
          cc:
            app:
              - path: /home/claude/coding
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        ports:
          http:
            port: 4180
    route:
      app:
        hostnames: ["cc.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 4180
