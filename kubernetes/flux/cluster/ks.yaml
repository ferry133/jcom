---
# Flux entry point for this per-user cluster.
# Defines the jg-base GitRepository and all Kustomizations.
# Generated by task configure from cluster.yaml.

# ── cluster-secrets — SOPS-decrypted from per-user repo ──────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-secrets
  namespace: flux-system
spec:
  decryption:
    provider: sops
  interval: 1h
  path: ./kubernetes/components/sops
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
# ── GitRepository — points to jg-base ────────────────────────────────────────
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: jg-base
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/ferry133/jg-base
  ref:
    branch: main
---
# ── Base Kustomization — installed on every cluster ───────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-base
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: jg-base
    namespace: flux-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  wait: false
  patches:
    - patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
---
# ── extras/storage/local-path-provisioner ─────────────────────────────────────────────────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: extras-local-path-provisioner
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps/extras/storage/local-path-provisioner
  prune: true
  sourceRef:
    kind: GitRepository
    name: jg-base
    namespace: flux-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  dependsOn:
    - name: cluster-apps-base
---
